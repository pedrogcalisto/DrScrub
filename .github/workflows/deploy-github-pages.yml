# Deploy Angular app to GitHub Pages
# Repo: https://github.com/pedrogcalisto/DrScrub.github.io
# Live site: https://pedrogcalisto.github.io/DrScrub.github.io/
#
# In the repo: Settings → Pages → Build and deployment → Source: GitHub Actions

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Must match GitHub Pages URL path for this repository name
      - name: Build production
        run: npx ng build --configuration production --base-href=/DrScrub.github.io/

      # GitHub Pages: deep links / refresh need 404.html = index.html for SPA
      - name: SPA fallback for GitHub Pages
        run: cp dist/dr-scrub/browser/index.html dist/dr-scrub/browser/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/dr-scrub/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
